<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Special Access</title>
    <link href="winduy.html" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        h2 { margin-bottom: 20px; font-size: 18px; color: #333; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover { background-color: #555; }
        #error-msg { color: red; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<script>
    // Cek apakah dia datang dari login.html atau tidak
    // Ini proteksi sederhana agar dia harus lewat pintu depan
    if (document.referrer === "" || !document.referrer.includes("login.html")) {
        alert("Eits, login dulu dong!");
        window.location.href = "login.html";
    }
</script>

    <div class="login-box">
        <h2>Who are you? ❤️</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="checkLogin()">LOGIN</button>
        <p id="error-msg">Salah tuh, coba ingat lagi!</p>
    </div>

    <script>
        function checkLogin() {
            var user = document.getElementById("username").value;
            var pass = document.getElementById("password").value;

            // --- SETTING USERNAME & PASSWORD DISINI ---
            if (user === "pacar_abay" && pass === "sayangabay") {
                // Jika benar, pindah ke file utama kamu
                window.location.href = "winduy.html"; 
            } else {
                // Jika salah
                document.getElementById("error-msg").style.display = "block";
            }
        }
    </script>

</body>
</html>
